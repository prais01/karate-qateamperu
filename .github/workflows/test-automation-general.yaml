name: Test Automation - General

# Workflow para ejecuciones en push, pull_request, dispatch y schedule.
# - Soporta matrix para ubuntu y windows
# - Cache de Maven
# - Set up JDK 1.8 (según pom.xml)
# - Ejecuta: mvn clean test
# - Publica artifacts: target/surefire-reports y target/karate.log

on:
  push:
    branches: [ 'main', 'master', 'develop' ]
  pull_request:
    branches: [ 'main', 'master', 'develop' ]
  workflow_dispatch: {}
  schedule:
    # Ejecución diaria a las 02:00 UTC (ajusta según necesidades)
    - cron: '0 2 * * *'

jobs:
  test:
    name: Run tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        java: [ '1.8' ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'maven'

      - name: Cache local maven repository (fallback)
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Show Java and Maven versions
        run: |
          java -version || true
          mvn -version || true

      - name: Run Maven tests
        run: mvn -B -V -e clean test

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ matrix.os }}
          path: target/surefire-reports

      - name: Upload karate.log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: karate-log-${{ matrix.os }}
          path: target/karate.log

      - name: Upload full target (opcional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: target-artifacts-${{ matrix.os }}
          path: target

