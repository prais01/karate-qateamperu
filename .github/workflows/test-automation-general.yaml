name: Test Automation - General

on:
  push:
    branches: [ 'main', 'master', 'develop' ]
  pull_request:
    branches: [ 'main', 'master', 'develop' ]
  workflow_dispatch: {}
  schedule:
    - cron: '0 2 * * *'

jobs:
  test:
    name: Run tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # Evita que si falla Ubuntu, se cancele automáticamente Windows
      matrix:
        os: [ubuntu-latest, windows-latest]
        java: [ '8' ] # CORRECCIÓN: '8' en lugar de '1.8' para evitar el error de SemVer

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'maven'

      - name: Show Java and Maven versions
        run: |
          java -version
          mvn -version

      - name: Run Maven tests
        # Usamos bash tanto en Ubuntu como en Windows para estandarizar la ejecución
        shell: bash
        run: mvn -B -V -e clean test

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ matrix.os }}
          path: target/surefire-reports
          if-no-files-found: ignore # Evita advertencias amarillas si la prueba no generó reportes

      - name: Upload karate.log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: karate-log-${{ matrix.os }}
          path: target/karate.log
          if-no-files-found: ignore

      - name: Upload full target (opcional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: target-artifacts-${{ matrix.os }}
          path: target
          if-no-files-found: ignore